name: Publish to MCP Registry

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate local metadata
        run: npm test

      - name: Validate registry schema
        run: |
          curl -fsS \
            -H "Content-Type: application/json" \
            --data @server.json \
            https://registry.modelcontextprotocol.io/v0.1/validate

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish server to MCP Registry
        run: ./mcp-publisher publish

      - name: Verify registry readback
        run: |
          node <<'NODE'
          const name = "io.github.eibrahim/dedicated-mac-mini-ai-bot-setup";
          const url = `https://registry.modelcontextprotocol.io/v0.1/servers/${encodeURIComponent(name)}/versions/latest`;
          const response = await fetch(url);
          if (!response.ok) {
            throw new Error(`Registry readback failed: ${response.status} ${await response.text()}`);
          }
          const payload = await response.json();
          if (payload.server?.name !== name) {
            throw new Error(`Unexpected registry name: ${JSON.stringify(payload)}`);
          }
          if (payload.server?.remotes?.[0]?.url !== "https://www.emadibrahim.com/mcp") {
            throw new Error(`Unexpected registry remote: ${JSON.stringify(payload.server?.remotes)}`);
          }
          console.log(`Verified ${name} in the official MCP Registry`);
          NODE
